syntax = "proto3";

message TestMessage {
    int32             f_int32             = 1;
    sint32            f_sint32            = 2;
    sfixed32          f_sfixed32          = 3;
    repeated int32    f_repeated_int32    = 4;
    repeated sint32   f_repeated_sint32   = 5;
    repeated sfixed32 f_repeated_sfixed32 = 6;
}