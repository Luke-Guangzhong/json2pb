name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # 代码格式检查
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C code formatting
        run: |
          find src include test -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

      - name: Install cmake-format
        run: |
          pip install cmake-format

      - name: Check CMake formatting
        run: |
          find . -name 'CMakeLists.txt' -o -name '*.cmake' | xargs cmake-format --check

  # 静态分析
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy protobuf-c-compiler libprotobuf-c-dev

      - name: Configure CMake for clang-tidy
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Debug -DENABLE_TEST=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..

      - name: Run clang-tidy
        run: |
          # 运行静态分析（使用 .clang-tidy 配置文件）
          # 只将真正的错误作为失败条件，警告仅供参考
          find src -name '*.c' | xargs clang-tidy -p build --warnings-as-errors='' --exit-code-threshold=error || true

  # 构建和测试 (Linux)
  build-test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-c-compiler libprotobuf-c-dev libprotobuf-dev libcunit1-dev git

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_TEST=ON ..

      - name: Build
        run: |
          cd build
          cmake --build . --config ${{ matrix.build_type }}

      - name: Run tests
        run: |
          cd build
          ctest --verbose --output-on-failure .

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-linux-${{ matrix.build_type }}
          path: build/Testing/

  # 构建和测试 (macOS)
  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install protobuf protobuf-c cunit

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_TEST=ON ..

      - name: Build
        run: |
          cd build
          cmake --build . --config ${{ matrix.build_type }}

      - name: Run tests
        run: |
          cd build
          ctest --verbose --output-on-failure .

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-macos-${{ matrix.build_type }}
          path: build/Testing/

  # 构建发布产物
  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [build-test-linux, build-test-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-c-compiler libprotobuf-c-dev

      - name: Build static library
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build .

      - name: Package artifacts
        run: |
          cd build
          mkdir -p package/include package/lib package/bin
          cp ../include/*.h package/include/
          cp lib/*.a package/lib/ || true
          cp lib/*.so* package/lib/ || true
          tar czf json2pb-linux-x64.tar.gz -C package .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: json2pb-linux-x64
          path: build/json2pb-linux-x64.tar.gz
          retention-days: 30
